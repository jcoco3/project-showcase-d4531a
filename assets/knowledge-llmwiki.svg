<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 740" font-family="Segoe UI, Roboto, Helvetica, sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="90%">
      <stop offset="0%" stop-color="#0a1018"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="cyanFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3ff0ff"/>
      <stop offset="100%" stop-color="#3ff0ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="violetFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b794ff"/>
      <stop offset="100%" stop-color="#b794ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="greenFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3dff85"/>
      <stop offset="100%" stop-color="#3dff85" stop-opacity="0"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3ff0ff"/>
    </marker>
    <marker id="arrowLoop" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8aa0b0"/>
    </marker>
  </defs>

  <rect width="1200" height="740" fill="url(#bg)"/>
  <rect x="8" y="8" width="1184" height="724" rx="20" fill="none" stroke="#3ff0ff" stroke-opacity="0.18"/>

  <!-- title -->
  <text x="600" y="64" text-anchor="middle" fill="#ffffff" font-size="40" font-weight="700" letter-spacing="1">The LLM Wiki</text>
  <text x="600" y="98" text-anchor="middle" fill="#8aa0b0" font-size="18" letter-spacing="3">KARPATHY'S APPEND-AND-CURATE KNOWLEDGE METHOD</text>

  <!-- STAGE 1: CAPTURE -->
  <g>
    <rect x="60" y="200" width="270" height="260" rx="16" fill="#0a121c" stroke="#3ff0ff" stroke-opacity="0.5"/>
    <rect x="60" y="200" width="6" height="260" rx="3" fill="url(#cyanFade)"/>
    <text x="92" y="240" fill="#3ff0ff" font-size="13" letter-spacing="3">01 / CAPTURE</text>
    <text x="92" y="278" fill="#ffffff" font-size="22" font-weight="650">Raw Experience</text>
    <g fill="#dfeaf2" font-size="16">
      <text x="92" y="320">&#9670;  Project &amp; build work</text>
      <text x="92" y="352">&#9670;  Working sessions</text>
      <text x="92" y="384">&#9670;  Lessons &amp; gotchas</text>
      <text x="92" y="416">&#9670;  Reusable patterns</text>
    </g>
  </g>

  <!-- arrow 1 -> 2 -->
  <line x1="338" y1="330" x2="430" y2="330" stroke="#3ff0ff" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- STAGE 2: CURATE -->
  <g>
    <rect x="438" y="200" width="270" height="260" rx="16" fill="#120c1c" stroke="#b794ff" stroke-opacity="0.5"/>
    <rect x="438" y="200" width="6" height="260" rx="3" fill="url(#violetFade)"/>
    <text x="470" y="240" fill="#b794ff" font-size="13" letter-spacing="3">02 / CURATE</text>
    <text x="470" y="278" fill="#ffffff" font-size="22" font-weight="650">Distill</text>
    <!-- funnel -->
    <path d="M474 312 L672 312 L596 372 L596 420 L550 420 L550 372 Z" fill="none" stroke="#b794ff" stroke-opacity="0.8" stroke-width="2"/>
    <g fill="#dfeaf2" font-size="15" text-anchor="middle">
      <text x="573" y="338">summarize &#183; dedupe</text>
      <text x="573" y="446">keep only what's</text>
      <text x="573" y="466">broadly reusable</text>
    </g>
  </g>

  <!-- arrow 2 -> 3 -->
  <line x1="716" y1="330" x2="808" y2="330" stroke="#3ff0ff" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- STAGE 3: THE WIKI -->
  <g>
    <rect x="816" y="160" width="324" height="340" rx="16" fill="#0a1c12" stroke="#3dff85" stroke-opacity="0.5"/>
    <rect x="816" y="160" width="6" height="340" rx="3" fill="url(#greenFade)"/>
    <text x="848" y="198" fill="#3dff85" font-size="13" letter-spacing="3">03 / THE WIKI</text>
    <text x="848" y="234" fill="#ffffff" font-size="22" font-weight="650">Structured Knowledge</text>

    <g>
      <rect x="848" y="256" width="262" height="64" rx="10" fill="#0f1410" stroke="#3dff85" stroke-opacity="0.35"/>
      <text x="868" y="288" fill="#3dff85" font-size="16" font-weight="600">index.md</text>
      <text x="868" y="308" fill="#8aa0b0" font-size="13">the catalog &#8212; what exists &amp; where</text>
    </g>
    <g>
      <rect x="848" y="330" width="262" height="64" rx="10" fill="#0f1410" stroke="#3dff85" stroke-opacity="0.35"/>
      <text x="868" y="362" fill="#3dff85" font-size="16" font-weight="600">wiki/&lt;page&gt;.md</text>
      <text x="868" y="382" fill="#8aa0b0" font-size="13">one durable page per topic</text>
    </g>
    <g>
      <rect x="848" y="404" width="262" height="64" rx="10" fill="#0f1410" stroke="#3dff85" stroke-opacity="0.35"/>
      <text x="868" y="436" fill="#3dff85" font-size="16" font-weight="600">log.md</text>
      <text x="868" y="456" fill="#8aa0b0" font-size="13">dated history of every ingest</text>
    </g>
  </g>

  <!-- feedback loop: wiki -> back to capture -->
  <path d="M978 500 C 978 640, 700 660, 195 660 C 120 660, 120 600, 150 478"
        fill="none" stroke="#8aa0b0" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#arrowLoop)"/>
  <text x="585" y="652" text-anchor="middle" fill="#dfeaf2" font-size="16" font-weight="600">RECALL</text>
  <text x="585" y="674" text-anchor="middle" fill="#8aa0b0" font-size="13">every project reads it &#8212; and writes new lessons back</text>

  <!-- footer caption -->
  <text x="600" y="716" text-anchor="middle" fill="#5b6b78" font-size="13" letter-spacing="1">Captured once, curated, reused everywhere &#8212; knowledge that compounds over time.</text>
</svg>
