<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <filter id="glow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" fill="#000000"/>
  <!-- TIN wireframe — 32 triangles forming a perspective terrain surface -->
  <g filter="url(#glow)" stroke="#3ff0ff" stroke-width="0.9" stroke-linejoin="round" fill="none" opacity="0.85">
    <!-- Rows 3-4 (back band) -->
    <polygon points="110,75 175,60 80,115"/>
    <polygon points="175,60 145,100 80,115"/>
    <polygon points="175,60 230,55 145,100"/>
    <polygon points="230,55 205,105 145,100"/>
    <polygon points="230,55 285,65 205,105"/>
    <polygon points="285,65 265,95 205,105"/>
    <polygon points="285,65 340,80 265,95"/>
    <polygon points="340,80 325,115 265,95"/>
    <!-- Rows 2-3 -->
    <polygon points="80,115 145,100 60,165"/>
    <polygon points="145,100 125,150 60,165"/>
    <polygon points="145,100 205,105 125,150"/>
    <polygon points="205,105 195,155 125,150"/>
    <polygon points="205,105 265,95 195,155"/>
    <polygon points="265,95 260,145 195,155"/>
    <polygon points="265,95 325,115 260,145"/>
    <polygon points="325,115 325,165 260,145"/>
    <!-- Rows 1-2 -->
    <polygon points="60,165 125,150 50,210"/>
    <polygon points="125,150 120,195 50,210"/>
    <polygon points="125,150 195,155 120,195"/>
    <polygon points="195,155 195,205 120,195"/>
    <polygon points="195,155 260,145 195,205"/>
    <polygon points="260,145 265,200 195,205"/>
    <polygon points="260,145 325,165 265,200"/>
    <polygon points="325,165 335,215 265,200"/>
    <!-- Rows 0-1 (front band) -->
    <polygon points="50,210 120,195 50,260"/>
    <polygon points="120,195 125,250 50,260"/>
    <polygon points="120,195 195,205 125,250"/>
    <polygon points="195,205 200,255 125,250"/>
    <polygon points="195,205 265,200 200,255"/>
    <polygon points="265,200 275,248 200,255"/>
    <polygon points="265,200 335,215 275,248"/>
    <polygon points="335,215 345,262 275,248"/>
  </g>
  <!-- Vertex dots -->
  <g filter="url(#glow)" fill="#3ff0ff" opacity="0.95">
    <circle cx="110" cy="75" r="2.5"/><circle cx="175" cy="60" r="2.5"/>
    <circle cx="230" cy="55" r="2.5"/><circle cx="285" cy="65" r="2.5"/>
    <circle cx="340" cy="80" r="2.5"/>
    <circle cx="80" cy="115" r="2.5"/><circle cx="145" cy="100" r="2.5"/>
    <circle cx="205" cy="105" r="2.5"/><circle cx="265" cy="95" r="2.5"/>
    <circle cx="325" cy="115" r="2.5"/>
    <circle cx="60" cy="165" r="2.5"/><circle cx="125" cy="150" r="2.5"/>
    <circle cx="195" cy="155" r="2.5"/><circle cx="260" cy="145" r="2.5"/>
    <circle cx="325" cy="165" r="2.5"/>
    <circle cx="50" cy="210" r="2.5"/><circle cx="120" cy="195" r="2.5"/>
    <circle cx="195" cy="205" r="2.5"/><circle cx="265" cy="200" r="2.5"/>
    <circle cx="335" cy="215" r="2.5"/>
    <circle cx="50" cy="260" r="2.5"/><circle cx="125" cy="250" r="2.5"/>
    <circle cx="200" cy="255" r="2.5"/><circle cx="275" cy="248" r="2.5"/>
    <circle cx="345" cy="262" r="2.5"/>
  </g>
  <!-- Label -->
  <text x="200" y="290" text-anchor="middle" fill="#3ff0ff" opacity="0.40"
        font-family="monospace" font-size="8.5" letter-spacing="0.18em">TRIANGULATED IRREGULAR NETWORK</text>
</svg>
