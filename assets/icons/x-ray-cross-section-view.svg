<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
  <!-- Stacked translucent layers (point cloud depth) -->
  <!-- Back layer (most transparent) -->
  <rect x="4" y="6" width="16" height="12" rx="1.5" fill="#1976D2" opacity="0.2" stroke="#757575" stroke-width="0.8"/>
  <!-- Middle layer -->
  <rect x="5" y="7" width="14" height="11" rx="1.5" fill="#1976D2" opacity="0.4" stroke="#757575" stroke-width="0.8"/>
  <!-- Front layer (most opaque) -->
  <rect x="6" y="8" width="12" height="10" rx="1.5" fill="#1976D2" opacity="0.7" stroke="#1976D2" stroke-width="1"/>

  <!-- X-Ray grid/scan lines over the layers -->
  <!-- Vertical scan lines -->
  <line x1="8" y1="6" x2="8" y2="19" stroke="#FFC107" stroke-width="0.6" opacity="0.8"/>
  <line x1="12" y1="6" x2="12" y2="19" stroke="#FFC107" stroke-width="0.6" opacity="0.8"/>
  <line x1="16" y1="6" x2="16" y2="19" stroke="#FFC107" stroke-width="0.6" opacity="0.8"/>

  <!-- Horizontal scan lines -->
  <line x1="4" y1="10" x2="20" y2="10" stroke="#FFC107" stroke-width="0.6" opacity="0.8"/>
  <line x1="4" y1="14" x2="20" y2="14" stroke="#FFC107" stroke-width="0.6" opacity="0.8"/>

  <!-- Highlight dots at intersections (density points) -->
  <circle cx="8" cy="10" r="0.5" fill="#FFC107"/>
  <circle cx="12" cy="10" r="0.5" fill="#FFC107"/>
  <circle cx="16" cy="10" r="0.5" fill="#FFC107"/>
  <circle cx="8" cy="14" r="0.5" fill="#FFC107"/>
  <circle cx="12" cy="14" r="0.5" fill="#FFC107"/>
  <circle cx="16" cy="14" r="0.5" fill="#FFC107"/>

  <!-- Subtle ray/glow effect at top corners (scanning direction) -->
  <path d="M2 2 L6 6" stroke="#FFC107" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
  <path d="M22 2 L18 6" stroke="#FFC107" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
</svg>
