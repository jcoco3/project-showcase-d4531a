  <!-- Top face -->
  <polygon points="12,18 32,8 52,18 32,28" fill="rgba(0,180,255,0.12)" stroke="#00aaff" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Corner grips -->
  <circle cx="12" cy="18" r="2.5" fill="#00cc66"/>
  <circle cx="32" cy="8" r="2.5" fill="#00cc66"/>
  <circle cx="52" cy="18" r="2.5" fill="#00cc66"/>
  <circle cx="32" cy="28" r="2.5" fill="#00cc66"/>
  <circle cx="12" cy="42" r="2.5" fill="#00cc66"/>
  <circle cx="32" cy="52" r="2.5" fill="#00cc66"/>
  <circle cx="52" cy="42" r="2.5" fill="#00cc66"/>
  <!-- Point cloud scatter dots -->
  <circle cx="22" cy="23" r="1.5" fill="#ff6600" opacity="0.9"/>
  <circle cx="26" cy="20" r="1.3" fill="#ff8800" opacity="0.85"/>
