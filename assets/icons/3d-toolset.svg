  <circle cx="38" cy="19" r="1.5" fill="#ff8800" opacity="0.85"/>
  <circle cx="42" cy="22" r="1.3" fill="#ff6600" opacity="0.9"/>
  <circle cx="20" cy="32" r="1.4" fill="#ff8800" opacity="0.8"/>
  <circle cx="24" cy="36" r="1.3" fill="#ff6600" opacity="0.85"/>
  <circle cx="36" cy="34" r="1.5" fill="#ff8800" opacity="0.8"/>
  <circle cx="42" cy="30" r="1.3" fill="#ff6600" opacity="0.85"/>
  <circle cx="44" cy="36" r="1.4" fill="#ff8800" opacity="0.8"/>
</svg>
