<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D wireframe cube -->
  <!-- Front face -->
  <polygon points="12,42 32,52 32,28 12,18" fill="rgba(0,102,204,0.15)" stroke="#0066cc" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Right face -->
