<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" fill="#000000"/>
  <!-- Faint ground reference line -->
  <line x1="30" y1="248" x2="372" y2="248"
        stroke="#1b6f7a" stroke-width="1" stroke-dasharray="5,4" opacity="0.65"/>
  <!-- Vertical drop lines from each point to ground (faint) -->
  <g stroke="#1b6f7a" stroke-width="0.7" opacity="0.35">
    <line x1="55"  y1="200" x2="55"  y2="248"/>
    <line x1="105" y1="148" x2="105" y2="248"/>
    <line x1="160" y1="115" x2="160" y2="248"/>
    <line x1="215" y1="138" x2="215" y2="248"/>
    <line x1="265" y1="175" x2="265" y2="248"/>
    <line x1="315" y1="126" x2="315" y2="248"/>
    <line x1="358" y1="158" x2="358" y2="248"/>
  </g>
  <!-- Draped interpolated line — the plugin's output -->
  <polyline filter="url(#glow)"
    points="55,200 105,148 160,115 215,138 265,175 315,126 358,158"
    stroke="#3ff0ff" stroke-width="2.2" stroke-linejoin="round" fill="none" opacity="0.9"/>
  <!-- Survey input points (scattered, varying heights) -->
  <g filter="url(#glow)" fill="#3ff0ff" opacity="0.95">
    <circle cx="55"  cy="200" r="4.2"/>
    <circle cx="105" cy="148" r="4.2"/>
    <circle cx="160" cy="115" r="4.2"/>
    <circle cx="215" cy="138" r="4.2"/>
    <circle cx="265" cy="175" r="4.2"/>
    <circle cx="315" cy="126" r="4.2"/>
    <circle cx="358" cy="158" r="4.2"/>
  </g>
  <!-- Point index labels -->
  <g fill="#3ff0ff" opacity="0.50" font-family="monospace" font-size="8.5" text-anchor="middle">
    <text x="55"  y="192">P1</text>
    <text x="105" y="140">P2</text>
    <text x="160" y="107">P3</text>
    <text x="215" y="130">P4</text>
    <text x="265" y="167">P5</text>
    <text x="315" y="118">P6</text>
    <text x="358" y="150">P7</text>
  </g>
  <!-- Ground label -->
  <text x="368" y="244" text-anchor="end" fill="#1b6f7a" opacity="0.80"
        font-family="monospace" font-size="8">GND</text>
  <!-- Title label -->
  <text x="200" y="278" text-anchor="middle" fill="#3ff0ff" opacity="0.40"
        font-family="monospace" font-size="8.5" letter-spacing="0.14em">ELEVATION PROFILE — DRAPED LINE</text>
</svg>
