<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.9"/>
    </filter>
    <linearGradient id="bezel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cffaff"/>
      <stop offset="100%" stop-color="#1b6f7a"/>
    </linearGradient>
  </defs>
  <!-- round black panel with beveled cyan ring -->
  <circle cx="32" cy="32" r="29" fill="#000000" stroke="url(#bezel)" stroke-width="2.4"/>
  <circle cx="32" cy="32" r="24.5" fill="none" stroke="#3ff0ff" stroke-opacity="0.3" stroke-width="1.1"/>
  <!-- small, thin glowing X -->
  <g stroke="#3ff0ff" stroke-width="3" stroke-linecap="round" filter="url(#glow)">
    <line x1="26" y1="26" x2="38" y2="38"/>
    <line x1="38" y1="26" x2="26" y2="38"/>
  </g>
  <g stroke="#e2fdff" stroke-width="1.4" stroke-linecap="round">
    <line x1="26" y1="26" x2="38" y2="38"/>
    <line x1="38" y1="26" x2="26" y2="38"/>
  </g>
</svg>
